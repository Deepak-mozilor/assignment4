<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <img class="logo" src="images/Frame.png" alt="logo">
        <h1>Skywatcher</h1>
        <form id="city-form">
            <label for="city-name"></label>

            <div class="input-wrapper">
                <span class="search"><img class="search-icon"  src="images/Frame (4).png" alt="Search icon"></span>
                <input type="text" id="city-name" name="city-name">
                <button type="submit">Add city</button>
                <ul id="suggestions"></ul>
            </div>
            
        </form>
        
        <button class="unit-btn" id="celsius">Change unit</button>
    </header>
    <main>
        <div class="dashboard">
            
        </div>
        <button id="clear">Clear</button>
    </main>
    <script type='module' src="src/app.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <link rel="stylesheet" href="style.css">
    <script>
        async function checkAuth() {
            try {
                const res = await fetch("http://127.0.0.1:8000/verify-session", {
                    method: "GET",
                    // This is the magic word that sends the cookie to the bouncer!
                    credentials: "include" 
                });

                // If the backend returns 401 Unauthorized, kick them out
                if (!res.ok) {
                    window.location.href = "/login/login.html";
                }
                // If res.ok is true, they stay on the page!

            } catch (error) {
                console.error("Auth check failed:", error);
                window.location.href = "/login/login.html";
            }
        }

        // Run the check immediately
        checkAuth();
    </script>
</head>
<body>
    <header>
        <img class="logo" src="images/Frame.png" alt="logo">
        <h1>Skywatcher</h1>
        <form id="city-form">
            <label for="city-name"></label>

            <div class="input-wrapper">
                <span class="search"><img class="search-icon"  src="images/Frame (4).png" alt="Search icon"></span>
                <input type="text" id="city-name" name="city-name">
                <button type="submit">Add city</button>
                <ul id="suggestions"></ul>
            </div>
            
        </form>
        
        <button class="unit-btn" id="celsius">Change unit</button>
    </header>
    <main>
        <div class="dashboard">
            
        </div>
        <button id="clear">Clear</button>
        <button id="report">Report</button>
    </main>
    <script type='module' src="src/app.js"></script>
</body>
</html>
